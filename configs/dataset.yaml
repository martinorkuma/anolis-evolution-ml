project:
  name: anolis-evolution-ml
  species_group: Anolis
  task: classify_ecomorph_from_morphology
data:
  source_name: "Mahler et al. 2013 — Anolis morphology"
  source_url: "https://datadryad.org/dataset/doi:10.5061/dryad.9g182"
  raw_dir: "data/raw"
  interim_dir: "data/interim"
  processed_dir: "data/processed"
  raw_zip: "data/raw/Mahler_et_al_2013_Data.zip"
  extract_dir: "data/raw/Mahler_et_al_2013_Data"
  manifest_csv: "data/interim/manifest.csv"
  cleaned_csv: "data/processed/anolis_cleaned.csv"
model:
  target_column: "ecomorph"
  test_size: 0.25
  random_state: 42
  classifier: "random_forest"
outputs:
  metrics_json: "outputs/metrics/model_metrics.json"
  confusion_matrix_png: "outputs/figures/confusion_matrix.png"
  model_path: "outputs/models/random_forest_anolis.joblib"
  